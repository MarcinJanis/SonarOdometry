# Sonar configuration

sonar:
  rate: 2.0 # update frequency [Hz]
  position: # in relation to center of vehicle
    shift:
      x: 1.0 # [m]
      y: 1.0 # [m]
      z: 1.0 # [m]
    rotation:
      r: 0.0 # [rad]
      p: 0.2 # [rad]
      y: 0.0 # [rad]

  fov:
    horizontal: 2.268 # [rad]
    vertical: 0.349 # [rad]
  
  beams: # horizontal axis of sonar image
    n: 800 # amount of beams
    width: 0.02 # [rad]
  
  range: # vertical axis of sonar image
    n: 760 # number of distanse samples
    min:
    max:
    resolution:
  

  

