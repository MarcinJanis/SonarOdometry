# ========================================= #
# Model configuration file
# ========================================= #

DEBUG: True


# === Encoder configuration === #

FLS_IMG_H: 800 # input image height
FLS_IMG_W: 700 # input image weidth

F_MAP_C: 128 # or 256; features map output channels
F_MAP_FIRST_DIM: 32 # or 64; first dimension upsize in encoder's residual block

# Encoder channels size:
# 1 -> F_MAP_FIRST_DIM, Conv2d
# F_MAP_FIRST_DIM -> F_MAP_FIRST_DIM, Residual Block 1.1
# F_MAP_FIRST_DIM -> F_MAP_FIRST_DIM, Residual Block 1.2
# F_MAP_FIRST_DIM -> F_MAP_FIRST_DIM * 2, Residual Block 2.1
# F_MAP_FIRST_DIM * 2 -> F_MAP_FIRST_DIM * 2, Residual Block 2.2
# F_MAP_FIRST_DIM * 2 -> F_MAP_C, Conv2d

# Encoder downsizing -> x4 



# === Graph configuration === #

BUFF_SIZE: 10 # Ring buffer size, amount of last frames that are kept

PATCHES_PER_FRAME: 40 # Amount of patches extracted from single frame 

PATCH_GRID_SIZE: # Size of grid that divides sonar img in equals part to extract patches evenly
  x: 30
  y: 30 

PATCH_SIZE: # Patch size, extracted from features map 
  x: 3

# PATCHIFIER_METHOD: 'harris' # Extract patches center from points with stringest Harris Response -> Key Points
PATCHIFIER_METHOD: 'harris_debug' # harris method with debug and visualisation functionallities


  y: 3
  
